[build]
  command = "npm run build"
  publish = "build/client"

# Para SSR en Netlify se necesita un adaptador serverless.
# Instalar: npm i @netlify/functions
# Crear: netlify/functions/server.ts con createRequestHandler
# Más info: https://reactrouter.com/how-to/netlify
#
# Mientras tanto, para desarrollo local:
#   npm run dev    → usa MongoDB Atlas
#   npm run mock   → usa MongoDB en memoria + datos seed
